<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
    <title>FreshMart | Online Grocery</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="head">
            <h1>FreshMart</h1>
            <h1 style="color:red">Admin</h1>
        </div>
        <nav>
            <span id="admin-link-container"></span>
            <a href="test.html">Home</a>
            <a href="#">About</a>
        </nav>
    </header>
    <section class="hero">
        <!--<h2>from Farm to your Table</h2>
        <p>Healthy • Organic • Affordable</p>-->
    </section>    



    <div class="container">
            <form id="loginForm">
                <div class="input-field">
                    <input type="text" id="username" required>
                    <label>Email Address</label>
                </div>
                <div class="input-field" style="position:relative;">
                <input type="password" id="password" required>
                    <label>Password</label>
                    <span class="toggle-password" data-target="password" style="position:absolute; right:10px; top:10px; cursor:pointer;">
                        <img src="images/view.png" alt="Toggle" width="20">
                    </span>
                </div>
                <button type="submit" class="category-btn active" style="width:100%; margin-top:20px;">Login</button>
                <div class="account-options">
                    <p>Don't have an account? <a href="Register.html" style="color:#2a5298;">Register</a></p>
                </div>
            </form>
        </div>
    

    <section class="footer">
        <h2><b>FreshMart</b></h2>
        <p>Healthy Living</p>
        <p>
        &copy; 2026 All Rights Reserved By FreshMart
        </p>
    </section>
</body>

</html>
